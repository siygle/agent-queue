name = "agent-queue-hub"
main = "src/index.ts"
compatibility_date = "2026-04-30"

[[queues.producers]]
binding = "AGENT_INCOMING"
queue = "agent-incoming"

[[queues.producers]]
binding = "AGENT_RESULTS"
queue = "agent-results"

[[queues.consumers]]
queue = "agent-incoming"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "agent-results"
max_batch_size = 10
max_batch_timeout = 5

[[d1_databases]]
binding = "DB"
database_name = "agent-queue"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Set secrets with:
# wrangler secret put HUB_TOKEN
# wrangler secret put CALLBACK_SECRET
